# تعریف فضای ذخیره‌سازی کش
proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=wcd_cache:10m max_size=1g inactive=60m use_temp_path=off;

server {
    listen 80;
    server_name localhost;

    # تنظیمات پیش‌فرض: ارسال تمام درخواست‌ها به سرور اصلی بدون کش
    location / {
        proxy_pass http://web:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        
        # افزودن هدر وضعیت کش برای کمک به اسکریپت تشخیص عضو دوم
        add_header X-Cache MISS;
    }

    # پیکربندی آسیب‌پذیر: کش کردن اجباری فایل‌هایی با پسوند استاتیک
    location ~* \.(css|js|png|jpg)$ {
        proxy_pass http://web:5000;
        proxy_set_header Host $host;
        
        # نادیده گرفتن دستورات عدم ذخیره‌سازی سرور اصلی (قلب آسیب‌پذیری)
        proxy_ignore_headers Cache-Control Set-Cookie Expires;
        
        proxy_cache wcd_cache;
        proxy_cache_valid 200 302 10m;
        proxy_cache_valid 404 1m;
        
# تغییر نام هدر مطابق انتظار نفر سوم
        add_header X-Cache $upstream_cache_status;
    }
}