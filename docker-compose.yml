version: '3.8'

services:
  web:
    build: ./app
    ports:
      - "5000:5000" # دسترسی مستقیم به سرور اصلی (برای تست صحت عملکرد)
    environment:
      - FLASK_ENV=development

  nginx:
    image: nginx:latest
    #image: ghcr.io/nginxinc/nginx-unprivileged:alpine
    ports:
      - "8080:80" # پورت اصلی که کاربر/مهاجم با آن کار می‌کند
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web